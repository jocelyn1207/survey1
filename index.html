<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究問卷載入中...</title>
    <script>
        // 四種實驗情境的問卷連結
        const surveyLinks = [
            "https://www.surveycake.com/s/7qvp3",
            "https://www.surveycake.com/s/YVndz",
            "https://www.surveycake.com/s/42vYB",
            "https://www.surveycake.com/s/XmnLM"
        ];

        // 隨機抽取 0 到 3 的數字
        const randomIndex = Math.floor(Math.random() * surveyLinks.length);

        // 執行轉址
        window.location.replace(surveyLinks[randomIndex]);
    </script>

            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
